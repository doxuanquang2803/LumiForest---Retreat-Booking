<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · LumiForest Admin</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Flag Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body class="login-page">

  <button class="lang-switch lang-switch-float" id="lang-toggle" type="button" title="Language">
    <span class="fi fi-gb" id="lang-flag"></span> <span id="lang-label">EN</span>
  </button>

  <div class="login-card">
    <div class="text-center mb-4">
      <span class="login-logo"><i class="bi bi-gem"></i></span>
      <h3 class="mb-1">LumiForest Admin</h3>
      <p class="text-muted mb-0" data-i18n="login.subtitle">Sign in to access the dashboard</p>
    </div>

    <div id="login-error" class="alert alert-danger d-none"></div>

    <form id="login-form">
      <div class="mb-3">
        <label for="email" class="form-label" data-i18n="login.email">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" class="form-control" id="email" placeholder="admin@lumiforest.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label" data-i18n="login.password">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
        <i class="bi bi-box-arrow-in-right me-1"></i> <span data-i18n="login.btn">Login</span>
      </button>
    </form>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('login-error');

      try {
        btn.disabled = true;
        btn.innerHTML = window.t('login.signing');
        errorDiv.classList.add('d-none');

        const response = await api.post('/auth/login', { email, password });

        const token = response.accessToken || response.token;
        if (token) {
          localStorage.setItem('token', token);
          localStorage.setItem('user', JSON.stringify(response.user));
          window.location.href = '../index.html';
        }
      } catch (err) {
        errorDiv.textContent = err.message || window.t('login.error');
        errorDiv.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> ' + window.t('login.btn');
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script src="js/CustomAlert.js"></script>
</body>
</html>
