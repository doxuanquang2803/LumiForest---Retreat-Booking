<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users · LumiForest Admin</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div class="d-flex" id="wrapper">

    <!-- Sidebar -->
    <div id="sidebar-wrapper">
      <div class="sidebar-heading text-center fw-bold">
        <span class="text-primary">LumiForest</span> Admin
      </div>
      <div class="sidebar-section" data-i18n="section.management">Management</div>
      <div class="list-group list-group-flush">
        <a href="../index.html" class="list-group-item list-group-item-action">
          <i class="bi bi-grid-1x2-fill me-2"></i><span data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="users.html" class="list-group-item list-group-item-action active">
          <i class="bi bi-people-fill me-2"></i><span data-i18n="nav.users">Users</span>
        </a>
        <a href="reports.html" class="list-group-item list-group-item-action">
          <i class="bi bi-bar-chart-line-fill me-2"></i><span data-i18n="nav.reports">Reports</span>
        </a>
        <a href="audit.html" class="list-group-item list-group-item-action">
          <i class="bi bi-journal-text me-2"></i><span data-i18n="nav.audit">Audit Logs</span>
        </a>
        <a href="trash.html" class="list-group-item list-group-item-action">
          <i class="bi bi-trash3-fill me-2"></i><span data-i18n="nav.trash">Trash</span>
        </a>
        <a href="settings.html" class="list-group-item list-group-item-action">
          <i class="bi bi-gear-fill me-2"></i><span data-i18n="nav.settings">System Settings</span>
        </a>
      </div>
      <div class="sidebar-section" data-i18n="section.other">Other</div>
      <div class="list-group list-group-flush">
        <a href="../../index.html" class="list-group-item list-group-item-action">
          <i class="bi bi-box-arrow-up-right me-2"></i><span data-i18n="nav.website">View Website</span>
        </a>
      </div>
    </div>
    <!-- /#sidebar-wrapper -->

    <!-- Page Content -->
    <div id="page-content-wrapper">
      <nav class="navbar navbar-expand-lg">
        <div class="d-flex align-items-center">
          <i class="bi bi-list me-3" id="menu-toggle"></i>
          <h2 class="m-0" data-i18n="nav.users">Users</h2>
        </div>
        <div class="ms-auto d-flex align-items-center gap-2">
          <button class="lang-switch" id="lang-toggle" type="button" title="Language">
            <span class="fi fi-gb" id="lang-flag"></span> <span id="lang-label">EN</span>
          </button>
          <div class="dropdown">
            <a class="dropdown-toggle text-decoration-none" href="#" id="navbarDropdown"
              role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="avatar"><i class="bi bi-person-fill"></i></span>
              <span id="user-name" class="fw-semibold">Admin</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
              <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-2"></i><span data-i18n="menu.logout">Logout</span></a></li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container-fluid" id="main-content">
        <div class="d-flex justify-content-between align-items-center page-heading">
          <div>
            <h3 data-i18n="users.title">Manage Users</h3>
            <p data-i18n="users.subtitle">Create, edit and assign account roles.</p>
          </div>
          <button class="btn btn-primary" onclick="window.openUserModal()">
            <i class="bi bi-plus-circle me-1"></i> <span data-i18n="users.add">Add User</span>
          </button>
        </div>

        <!-- Users Table -->
        <div class="bg-white p-0 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle" id="users-table">
              <thead>
                <tr>
                  <th data-i18n="th.id">ID</th>
                  <th data-i18n="th.name">Name</th>
                  <th data-i18n="th.email">Email</th>
                  <th data-i18n="th.role">Role</th>
                  <th class="text-end" data-i18n="th.actions">Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="5" class="text-center text-muted py-4" data-i18n="users.loading">Loading users...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- User Modal (Create/Edit) -->
  <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="user-form">
          <div class="modal-header">
            <h5 class="modal-title" id="userModalLabel" data-i18n="modal.title">Add / Edit User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="userId">
            <div id="modal-error" class="alert alert-danger d-none"></div>
            <div class="mb-3">
              <label for="username" class="form-label" data-i18n="modal.username">Username</label>
              <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
              <label for="userEmail" class="form-label" data-i18n="modal.email">Email</label>
              <input type="email" class="form-control" id="userEmail" required>
            </div>
            <div class="mb-3">
              <label for="userPassword" class="form-label"><span data-i18n="modal.password">Password</span> <small class="text-muted" id="pwd-help" data-i18n="modal.pwdHelp">(Leave blank if unchanged)</small></label>
              <input type="password" class="form-control" id="userPassword">
            </div>
            <div class="mb-3">
              <label for="userRole" class="form-label" data-i18n="modal.role">Role</label>
              <select class="form-select" id="userRole" required>
                <option value="CUSTOMER" data-i18n="role.customer">Customer</option>
                <option value="STAFF" data-i18n="role.staff">Staff</option>
                <option value="ADMIN" data-i18n="role.admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="modal.cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="save-user-btn" data-i18n="modal.save">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/users.js"></script>
  <script>
    var el = document.getElementById("wrapper");
    var toggleButton = document.getElementById("menu-toggle");
    toggleButton.onclick = function () {
      el.classList.toggle("toggled");
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script src="js/CustomAlert.js"></script>
</body>
</html>
