<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Thông báo - LumiForest</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:400,400i,700,700i" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="assets/css/ionicons.min.css">
    <link rel="stylesheet" href="assets/css/flaticon.css">
    <link rel="stylesheet" href="assets/css/icomoon.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
    <style>
      .notif-item {
        border-left: 4px solid #eee;
        transition: background .15s;
        cursor: pointer;
      }
      .notif-item.unread { border-left-color: #F96D00; background: #fff9f5; }
      .notif-item:hover { background: #f8f8f8; }
      .notif-item.unread:hover { background: #fff3ea; }
      .notif-dot {
        width:10px; height:10px; border-radius:50%;
        background:#F96D00; flex-shrink:0; margin-top:5px;
      }
      .notif-type-badge { font-size:11px; }
      .btn-mark-read { font-size:12px; color:#F96D00; border:none; background:none; padding:0; }
      .btn-mark-read:hover { text-decoration:underline; }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
  <body>
    <div id="header-placeholder"></div>

    <div class="hero-wrap" style="background-image: url('assets/images/bg_1.jpg');">
      <div class="overlay"></div>
      <div class="container">
        <div class="row no-gutters slider-text d-flex align-items-end justify-content-center">
          <div class="col-md-9 ftco-animate text-center d-flex align-items-end justify-content-center">
            <div class="text">
              <p class="breadcrumbs mb-2"><span class="mr-2"><a href="index.html" data-i18n="bread.home">Home</a></span><span data-i18n="page.notifications">Thông báo</span></p>
              <h1 class="mb-4 bread" data-i18n="page.notifications">Thông báo</h1>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="ftco-section bg-light">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">

            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="mb-0"><span data-i18n="nf.allTitle">Tất cả thông báo</span> <span id="unread-badge" class="badge badge-danger ml-1" style="display:none"></span></h4>
              <button id="btn-mark-all" class="btn btn-outline-secondary btn-sm" style="display:none">
                <span class="ion-ios-checkmark-circle"></span> <span data-i18n="nf.markAll">Đánh dấu tất cả đã đọc</span>
              </button>
            </div>

            <div id="notif-loading" class="text-center py-5"><p data-i18n="common.loading">Đang tải...</p></div>

            <div id="notif-empty" class="text-center py-5" style="display:none">
              <span class="ion-ios-notifications-off" style="font-size:64px;color:#ddd"></span>
              <p class="mt-3 text-muted" data-i18n="nf.emptyMsg">Không có thông báo nào.</p>
            </div>

            <div id="notif-list"></div>

            <div class="text-center mt-4" id="pagination-wrap"></div>

          </div>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>
    <div id="ftco-loader" class="show fullscreen"><svg class="circular" width="48px" height="48px"><circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee"/><circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10" stroke="#F96D00"/></svg></div>

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery-migrate-3.0.1.min.js"></script>
    <script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/jquery.easing.1.3.js"></script>
    <script src="assets/js/jquery.waypoints.min.js"></script>
    <script src="assets/js/jquery.stellar.min.js"></script>
    <script src="assets/js/owl.carousel.min.js"></script>
    <script src="assets/js/jquery.magnific-popup.min.js"></script>
    <script src="assets/js/aos.js"></script>
    <script src="assets/js/bootstrap-datepicker.js"></script>
    <script src="assets/js/jquery.timepicker.min.js"></script>
    <script src="assets/js/scrollax.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/i18n.js"></script>
  <script src="assets/js/header.js"></script>
    <script src="assets/js/includes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="assets/js/CustomAlert.js"></script>
</body>
</html>
