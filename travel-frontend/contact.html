  <body>

    <div id="header-placeholder"></div>

    <div class="hero-wrap" style="background-image: url('assets/images/bg_1.jpg');">
      <div class="overlay"></div>
      <div class="container">
        <div class="row no-gutters slider-text d-flex align-itemd-end justify-content-center">
          <div class="col-md-9 ftco-animate text-center d-flex align-items-end justify-content-center">
          	<div class="text">
	            <p class="breadcrumbs mb-2"><span class="mr-2"><a href="index.html" data-i18n="bread.home">Home</a></span> <span data-i18n="nav.contact">Contact</span></p>
	            <h1 class="mb-4 bread" data-i18n="footer.contactUs">Contact Us</h1>
            </div>
          </div>
        </div>
      </div>
    </div>


    <section class="ftco-section contact-section bg-light">
      <div class="container">
        <div class="row d-flex mb-5 contact-info">
          <div class="col-md-12 mb-4">
            <h2 class="h3" data-i18n="contact.infoTitle">Contact Information</h2>
          </div>
          <div class="w-100"></div>
          <div class="col-md-3 d-flex">
          	<div class="info bg-white p-4">
	            <p><span data-i18n="contact.address">Address:</span> <span id="pub-contact-address">198 West 21th Street, Suite 721 New York NY 10016</span></p>
	          </div>
          </div>
          <div class="col-md-3 d-flex">
          	<div class="info bg-white p-4">
	            <p><span data-i18n="contact.phone">Phone:</span> <a href="#" id="pub-contact-phone">+ 1235 2355 98</a></p>
	          </div>
          </div>
          <div class="col-md-3 d-flex">
          	<div class="info bg-white p-4">
	            <p><span data-i18n="contact.emailLabel">Email:</span> <a href="#" id="pub-contact-email">info@yoursite.com</a></p>
	          </div>
          </div>
          <div class="col-md-3 d-flex">
          	<div class="info bg-white p-4">
	            <p><span data-i18n="contact.website">Website</span> <a href="#" id="pub-contact-website">yoursite.com</a></p>
	          </div>
          </div>
        </div>
        <div class="row block-9">
          <div class="col-md-6 order-md-last d-flex">
            <form id="contact-form" class="bg-white p-5 contact-form">
              <div class="form-group">
                <input type="text" name="name" class="form-control" data-i18n-placeholder="contact.namePh" placeholder="Your Name">
              </div>
              <div class="form-group">
                <input type="email" name="email" class="form-control" data-i18n-placeholder="contact.emailPh" placeholder="Your Email">
              </div>
              <div class="form-group">
                <input type="text" name="subject" class="form-control" data-i18n-placeholder="contact.subjectPh" placeholder="Subject">
              </div>
              <div class="form-group">
                <textarea name="message" cols="30" rows="7" class="form-control" data-i18n-placeholder="contact.messagePh" placeholder="Message"></textarea>
              </div>
              <div class="form-group">
                <input type="submit" value="Send Message" data-i18n-value="contact.send" class="btn btn-primary py-3 px-5">
              </div>
              <div id="contact-msg" style="display:none"></div>
            </form>
          
          </div>

          <div class="col-md-6 d-flex">
          	<div id="contact-map" class="bg-white" style="width: 100%; min-height: 400px; height: 100%;"></div>
          </div>
        </div>
      </div>
    </section>



    <div id="footer-placeholder"></div>
