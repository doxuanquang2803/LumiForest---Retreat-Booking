<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/utility.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div id="wrapper">
    <div id="sidebar-wrapper"></div>
    <div id="page-content-wrapper">
      <div id="header-wrapper"></div>
      <div id="main-content" class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <h3 class="font-heading m-0" data-i18n="staff.payments.title">Payments Management</h3>
        </div>

        <!-- Filters -->
        <div class="card border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <input type="text" class="form-control form-control-custom" id="search-input" data-i18n-placeholder="staff.payments.searchPh" placeholder="Search by payment ID...">
              </div>
              <div class="col-md-3">
                <select class="form-select form-control-custom" id="status-filter">
                  <option value="" data-i18n="staff.payments.allStatuses">All Statuses</option>
                  <option value="pending" data-i18n="staff.payments.pending">Pending</option>
                  <option value="completed" data-i18n="staff.payments.completed">Completed</option>
                  <option value="failed" data-i18n="staff.payments.failed">Failed</option>
                  <option value="refunded" data-i18n="staff.payments.refunded">Refunded</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="card border-0">
          <div class="card-body p-0">
            <div id="payments-table"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="modals-wrapper"></div>
  <div id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { LayoutRenderer } from './components/LayoutRenderer.js';
    import { LifecycleManager } from './services/LifecycleManager.js';

    (async () => {
      await LayoutRenderer.init();
      LifecycleManager.loadModule(import('./js/modules/payments.js'));
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script type="module">import { CustomAlert } from "./services/CustomAlert.js"; window.CustomAlert = CustomAlert;</script>
</body>
</html>
