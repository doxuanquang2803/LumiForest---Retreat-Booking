<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vouchers - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/utility.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div id="wrapper">
    <div id="sidebar-wrapper"></div>
    <div id="page-content-wrapper">
      <div id="header-wrapper"></div>
      <div id="main-content" class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <h3 class="font-heading m-0" data-i18n="staff.vouchers.title">Vouchers Management</h3>
          <button class="btn btn-primary bg-primary-custom border-0" id="btn-add-voucher">
            <i class="bi bi-plus-lg"></i> <span data-i18n="staff.vouchers.add">Add Voucher</span>
          </button>
        </div>

        <!-- Filters -->
        <div class="card border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <input type="text" class="form-control form-control-custom" id="search-input" data-i18n-placeholder="staff.vouchers.searchPh" placeholder="Search vouchers...">
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="card border-0">
          <div class="card-body p-0">
            <div id="vouchers-table"></div>
          </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="voucherModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
              <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title font-heading" id="voucherModalLabel" data-i18n="staff.vouchers.addModal">Add Voucher</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <form id="voucher-form">
                  <input type="hidden" id="voucher-id">
                  <div class="row g-3">
                    <div class="col-md-12">
                      <label class="form-label"><span data-i18n="staff.label.name">Name</span> <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-custom" id="voucher-name" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label"><span data-i18n="staff.label.price">Price</span> <span class="text-danger">*</span></label>
                      <input type="number" class="form-control form-control-custom" id="voucher-price" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label"><span data-i18n="staff.vouchers.labelValue">Value</span> <span class="text-danger">*</span></label>
                      <input type="number" class="form-control form-control-custom" id="voucher-value" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-6 d-none">
                      <label class="form-label"><span data-i18n="staff.vouchers.labelQty">Total Quantity</span> <span class="text-danger">*</span></label>
                      <input type="number" class="form-control form-control-custom" id="voucher-quantity" min="1" value="999999">
                    </div>
                    <div class="col-md-6 d-none">
                      <label class="form-label" data-i18n="staff.vouchers.labelRemaining">Remaining Quantity</label>
                      <input type="number" class="form-control form-control-custom" id="voucher-remaining" min="0" value="999999">
                    </div>
                    <div class="col-12">
                      <label class="form-label" data-i18n="staff.label.description">Description</label>
                      <textarea class="form-control form-control-custom" id="voucher-desc" rows="3"></textarea>
                    </div>
                    <div class="col-12">
                      <label class="form-label" data-i18n="staff.vouchers.labelCover">Voucher Cover Image</label>
                      <div id="image-upload-container"></div>
                    </div>
                  </div>
                </form>
              </div>
              <div class="modal-footer border-top-0 pt-0 mt-3">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal" data-i18n="staff.cancel">Cancel</button>
                <button type="button" class="btn btn-primary bg-primary-custom border-0" id="btn-save-voucher" data-i18n="staff.vouchers.save">Save Voucher</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="modals-wrapper"></div>
  <div id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { LayoutRenderer } from './components/LayoutRenderer.js';
    import { LifecycleManager } from './services/LifecycleManager.js';

    (async () => {
      await LayoutRenderer.init();
      LifecycleManager.loadModule(import('./js/modules/vouchers.js?v=2'));
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script type="module">import { CustomAlert } from "./services/CustomAlert.js"; window.CustomAlert = CustomAlert;</script>
</body>
</html>
