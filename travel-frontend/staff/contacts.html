<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiries - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/utility.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div id="wrapper">
    <div id="sidebar-wrapper"></div>
    <div id="page-content-wrapper">
      <div id="header-wrapper"></div>
      <div id="main-content" class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <h3 class="font-heading m-0">Contact & Inquiries</h3>
        </div>

        <ul class="nav nav-tabs mb-4" id="contactsTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active font-heading" id="inquiries-tab" data-bs-toggle="tab" data-bs-target="#inquiries" type="button" role="tab" aria-controls="inquiries" aria-selected="true" data-i18n="staff.inquiries.title">Inquiries Management</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link font-heading" id="settings-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button" role="tab" aria-controls="settings" aria-selected="false">Contact Information</button>
          </li>
        </ul>

        <div class="tab-content" id="contactsTabContent">
          <!-- Inquiries Tab -->
          <div class="tab-pane fade show active" id="inquiries" role="tabpanel" aria-labelledby="inquiries-tab">
            <!-- Filters -->
            <div class="card border-0 mb-4">
              <div class="card-body">
                <div class="row g-3">
                  <div class="col-md-4">
                    <input type="text" class="form-control form-control-custom" id="search-input" data-i18n-placeholder="staff.inquiries.searchPh" placeholder="Search by name, email or message...">
                  </div>
                </div>
              </div>
            </div>

            <!-- Table -->
            <div class="card border-0">
              <div class="card-body p-0">
                <div id="contacts-table"></div>
              </div>
            </div>
          </div>

          <!-- Settings Tab -->
          <div class="tab-pane fade" id="settings" role="tabpanel" aria-labelledby="settings-tab">
            <div class="card border-0">
              <div class="card-body">
                <form id="contact-info-form">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <label class="form-label font-heading">Address</label>
                      <input type="text" class="form-control" id="contact-address" placeholder="Enter company address" required>
                    </div>
                    <div class="col-md-3">
                      <label class="form-label font-heading">Phone</label>
                      <input type="text" class="form-control" id="contact-phone" placeholder="Enter phone number" required>
                    </div>
                    <div class="col-md-3">
                      <label class="form-label font-heading">Email</label>
                      <input type="email" class="form-control" id="contact-email" placeholder="Enter email address" required>
                    </div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-12">
                      <label class="form-label font-heading">Location Map (Click to select)</label>
                      <div id="contact-map" style="height: 400px; border-radius: 8px; border: 1px solid #dee2e6;"></div>
                      <small class="text-muted">Click anywhere on the map to place a pin and save the coordinates.</small>
                    </div>
                  </div>
                  <div class="row mb-3 d-none">
                    <div class="col-md-6">
                      <input type="text" class="form-control" id="contact-lat">
                    </div>
                    <div class="col-md-6">
                      <input type="text" class="form-control" id="contact-lng">
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i> Save Information</button>
                </form>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="modals-wrapper"></div>
  <div id="sidebar-overlay"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { LayoutRenderer } from './components/LayoutRenderer.js';
    import { LifecycleManager } from './services/LifecycleManager.js';

    (async () => {
      await LayoutRenderer.init();
      LifecycleManager.loadModule(import('./js/modules/contacts.js'));
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script type="module">import { CustomAlert } from "./services/CustomAlert.js"; window.CustomAlert = CustomAlert;</script>
</body>
</html>
