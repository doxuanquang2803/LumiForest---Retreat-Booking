<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/utility.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">

  <!-- QuillJS Editor CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div id="wrapper">
    <div id="sidebar-wrapper"></div>
    <div id="page-content-wrapper">
      <div id="header-wrapper"></div>
      <div id="main-content" class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <h3 class="font-heading m-0" data-i18n="staff.blogs.title">Blogs Management</h3>
          <button class="btn btn-primary bg-primary-custom border-0" id="btn-add-blog">
            <i class="bi bi-plus-lg"></i> <span data-i18n="staff.blogs.write">Write Blog</span>
          </button>
        </div>

        <!-- Filters -->
        <div class="card border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <input type="text" class="form-control form-control-custom" id="search-input" data-i18n-placeholder="staff.blogs.searchPh" placeholder="Search title or content...">
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="card border-0">
          <div class="card-body p-0">
            <div id="blogs-table"></div>
          </div>
        </div>

        <!-- Add/Edit Modal -->
        <div class="modal fade" id="blogModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
          <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content border-0 shadow">
              <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title font-heading" id="blogModalLabel" data-i18n="staff.blogs.writeModal">Write Blog</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <form id="blog-form">
                  <input type="hidden" id="blog-id">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label"><span data-i18n="staff.blogs.labelTitle">Title</span> <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-custom" id="blog-title" required>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label"><span data-i18n="staff.blogs.labelSlug">Slug</span> <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-custom" id="blog-slug" required>
                      <small class="text-muted" data-i18n="staff.blogs.slugNote">Auto-generated from title</small>
                    </div>
                    <div class="col-md-12">
                      <label class="form-label"><span data-i18n="staff.blogs.labelContent">Content</span> <span class="text-danger">*</span></label>
                      <div id="blog-content-editor" style="height: 350px;"></div>
                    </div>
                    <div class="col-md-12">
                      <label class="form-label" data-i18n="staff.blogs.labelCover">Cover Image</label>
                      <div id="image-upload-container"></div>
                    </div>
                  </div>
                </form>
              </div>
              <div class="modal-footer border-top-0 pt-0 mt-3 d-flex justify-content-between">
                <div class="text-muted small" id="draft-status"></div>
                <div>
                  <button type="button" class="btn btn-light" data-bs-dismiss="modal" data-i18n="staff.cancel">Cancel</button>
                  <button type="button" class="btn btn-primary bg-primary-custom border-0" id="btn-save-blog" data-i18n="staff.blogs.publish">Publish Blog</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="modals-wrapper"></div>
  <div id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- QuillJS Editor JS -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script type="module">
    import { LayoutRenderer } from './components/LayoutRenderer.js';
    import { LifecycleManager } from './services/LifecycleManager.js';

    (async () => {
      await LayoutRenderer.init();
      LifecycleManager.loadModule(import('./js/modules/blogs.js'));
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script type="module">import { CustomAlert } from "./services/CustomAlert.js"; window.CustomAlert = CustomAlert;</script>
</body>
</html>
