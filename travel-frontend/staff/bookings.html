<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/utility.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
</head>
<body>

  <div id="wrapper">
    <div id="sidebar-wrapper"></div>
    <div id="page-content-wrapper">
      <div id="header-wrapper"></div>
      <div id="main-content" class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-1">
          <h3 class="font-heading m-0" data-i18n="staff.bookings.title">Bookings Management</h3>
        </div>

        <!-- Filters -->
        <div class="card border-0 mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <input type="text" class="form-control form-control-custom" id="search-input" data-i18n-placeholder="staff.bookings.searchPh" placeholder="Search by ID or customer...">
              </div>
              <div class="col-md-3">
                <select class="form-select form-control-custom" id="type-filter">
                  <option value="HOTEL" data-i18n="staff.bookings.hotelType">Hotel Bookings</option>
                  <option value="TOUR" data-i18n="staff.bookings.tourType">Tour Bookings</option>
                  <option value="APARTMENT" data-i18n="staff.bookings.aptType">Apartment Bookings</option>
                </select>
              </div>
              <div class="col-md-3">
                <select class="form-select form-control-custom" id="status-filter">
                  <option value="" data-i18n="staff.bookings.allStatuses">Tất cả</option>
                  <option value="ACTIVE" data-i18n="staff.bookings.active">Còn hiệu lực</option>
                  <option value="EXPIRED" data-i18n="staff.bookings.expired">Hết hiệu lực</option>
                  <option value="CANCELLED" data-i18n="staff.bookings.cancelled">Đã hủy</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="card border-0">
          <div class="card-body p-0">
            <div id="bookings-table"></div>
          </div>
        </div>

        <!-- Edit Status Modal removed -->

        <!-- Booking Detail Modal -->
        <div class="modal fade" id="bookingDetailModal" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
              <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title font-heading" id="bookingDetailModalLabel">Booking Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <div class="text-center mb-4">
                  <div class="d-inline-block p-3 bg-white border rounded shadow-sm mb-2">
                    <img id="detail-modal-qr" src="" style="width: 150px; height: 150px; object-fit: contain; display: none;" alt="QR Code">
                    <div id="detail-qr-loading" class="spinner-border spinner-border-sm text-warning" role="status"></div>
                  </div>
                  <p class="text-muted small mb-0">Check-in QR Code</p>
                </div>
                <div id="booking-detail-body">
                  <!-- Dynamically populated -->
                </div>
              </div>
              <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <div id="modals-wrapper"></div>
  <div id="sidebar-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { LayoutRenderer } from './components/LayoutRenderer.js';
    import { LifecycleManager } from './services/LifecycleManager.js';

    (async () => {
      await LayoutRenderer.init();
      LifecycleManager.loadModule(import('./js/modules/bookings.js?v=' + new Date().getTime()));
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script type="module">import { CustomAlert } from "./services/CustomAlert.js"; window.CustomAlert = CustomAlert;</script>
</body>
</html>
