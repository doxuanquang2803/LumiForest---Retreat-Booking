<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login - LumiForest</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Poppins:200,300,400,500,600,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:400,400i,700,700i" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/open-iconic-bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/animate.css">
    <link rel="stylesheet" href="assets/css/ionicons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/flaticon.css">
    <link rel="stylesheet" href="assets/css/icomoon.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">

    <style>
      body {
        background-image: url('assets/images/bg_1.jpg');
        background-size: cover;
        background-position: center center;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
      }
      .overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 0;
      }
      #header-placeholder {
        z-index: 2;
        position: relative;
      }
      .login-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1;
        padding: 100px 15px 60px 15px; /* Top space for dynamic navbar */
      }
      .login-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 12px;
        padding: 3rem 2.5rem;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 440px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .login-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .login-card h3 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        color: #1e1e1e;
        margin-bottom: 0.5rem;
      }
      .login-card .brand-text {
        color: #2ba5c9;
      }
      .form-group label {
        font-weight: 500;
        color: #666;
        font-size: 14px;
        margin-bottom: 5px;
        text-align: left;
        display: block;
      }
      .form-control {
        height: 50px !important;
        background: #fff !important;
        color: #000 !important;
        font-size: 15px;
        border-radius: 5px;
        border: 1px solid #e6e6e6 !important;
        padding-left: 15px;
        padding-right: 15px;
      }
      .form-control:focus {
        border-color: #2ba5c9 !important;
        box-shadow: none !important;
      }
      .btn-primary {
        background: #2ba5c9 !important;
        border: 1px solid #2ba5c9 !important;
        color: #fff !important;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 5px;
        height: 50px;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        background: transparent !important;
        color: #2ba5c9 !important;
        border-color: #2ba5c9 !important;
      }
      .text-center a {
        color: #2ba5c9;
        font-weight: 500;
        transition: color 0.2s ease;
      }
      .text-center a:hover {
        color: #1e7e9a;
        text-decoration: none;
      }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
  <body>

    <!-- Dark Background Overlay -->
    <div class="overlay"></div>

    <!-- Header Placeholder (Transparent LumiForest Header) -->
    <div id="header-placeholder"></div>

    <!-- Centered Login Section -->
    <div class="login-wrapper">
      <div class="login-card text-center">
        <h3 class="mb-2"><span data-i18n="auth.welcome">Welcome to</span> <span class="brand-text">LumiForest</span></h3>
        <p class="text-muted mb-4" data-i18n="auth.signinSub">Sign in to access your account</p>
        
        <div id="auth-msg" style="display:none" class="mb-3"></div>
        
        <form id="login-form" class="text-left">
          <div class="form-group mb-3">
            <label data-i18n="auth.email">Email Address</label>
            <input type="email" name="email" class="form-control" data-i18n-placeholder="auth.emailPh" placeholder="Enter your email" required autocomplete="email">
          </div>
          <div class="form-group mb-4" style="position: relative;">
            <label data-i18n="auth.password">Password</label>
            <input type="password" name="password" id="password-input" class="form-control" data-i18n-placeholder="auth.passwordPh" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 60px;">
            <i id="toggle-password" class="bi bi-eye" style="position: absolute; right: 20px; top: 40px; cursor: pointer; color: #2ba5c9; font-size: 18px; z-index: 10; user-select: none;"></i>
          </div>
          <div class="form-group mb-0">
            <button type="submit" class="btn btn-primary btn-block" data-i18n="nav.login">Login</button>
          </div>
        </form>

        <p class="text-center mt-4 mb-0 text-muted">
          <span data-i18n="auth.noAccount">Don't have an account?</span> <a href="register.html" data-i18n="auth.register">Register</a>
        </p>

        <!-- Google Sign-In Section -->
        <div class="mt-4 mb-2" style="display: flex; align-items: center; justify-content: center;">
          <hr style="flex: 1; border-color: #ddd;">
          <span style="padding: 0 10px; color: #888; font-size: 14px;" data-i18n="auth.orContinueWith">Hoặc tiếp tục với</span>
          <hr style="flex: 1; border-color: #ddd;">
        </div>
        <div id="google-btnContainer" style="display: flex; justify-content: center;"></div>
      </div>
    </div>

    <!-- Loader -->
    <div id="ftco-loader" class="show fullscreen"><svg class="circular" width="48px" height="48px"><circle class="path-bg" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke="#eeeeee"/><circle class="path" cx="24" cy="24" r="22" fill="none" stroke-width="4" stroke-miterlimit="10" stroke="#F96D00"/></svg></div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/popper.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <script src="assets/js/jquery.easing.1.3.js"></script>
    <script src="assets/js/jquery.waypoints.min.js"></script>
    <script src="assets/js/jquery.stellar.min.js"></script>
    <script src="assets/js/aos.js"></script>
    <script src="assets/js/scrollax.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/i18n.js"></script>
  <script src="assets/js/header.js"></script>
    <script src="assets/js/includes.js"></script>
    
    <script>
      function handleGoogleCredentialResponse(response) {
        var msg = document.getElementById('auth-msg');
        api.post('/auth/google', { credential: response.credential })
          .then(function (res) {
            if (res.success) {
              Auth.save(res.accessToken, res.user);
              Auth.saveTokens(res.accessToken, res.refreshToken);
              if (res.user.role === 'ADMIN') {
                window.location.href = 'admin-dashboard/index.html';
              } else if (res.user.role === 'STAFF') {
                window.location.href = 'staff/index.html';
              } else {
                window.location.href = 'index.html';
              }
            } else {
              msg.className = 'alert alert-danger';
              msg.textContent = res.message || t('auth.googleLoginFail') || 'Đăng nhập Google thất bại';
              msg.style.display = 'block';
            }
          }).catch(function (error) {
            console.error('Google login error:', error);
            msg.className = 'alert alert-danger';
            msg.textContent = t('common.connFail') || 'Lỗi kết nối máy chủ';
            msg.style.display = 'block';
          });
      }

      function onGoogleLibraryLoad() {
        const lang = window.I18N ? window.I18N.getLang() : 'en';
        google.accounts.id.initialize({
          client_id: 'YOUR_GOOGLE_CLIENT_ID',
          callback: handleGoogleCredentialResponse,
          context: 'signin'
        });
        google.accounts.id.renderButton(
          document.getElementById('google-btnContainer'),
          { theme: 'outline', size: 'large', text: 'signin_with', locale: lang }
        );
      }

      // Lắng nghe sự kiện đổi ngôn ngữ để load lại script Google (bắt buộc tải lại để đổi hl)
      document.addEventListener('i18n:changed', function (e) {
        document.getElementById('google-btnContainer').innerHTML = '';
        const existingScript = document.getElementById('google-jssdk');
        if (existingScript) existingScript.remove();
        
        const script = document.createElement('script');
        script.id = 'google-jssdk';
        script.src = 'https://accounts.google.com/gsi/client?hl=' + e.detail.lang + '&onload=onGoogleLibraryLoad';
        script.async = true;
        script.defer = true;
        document.body.appendChild(script);
      });
    </script>
    
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        // Load Google SDK dynamically with correct language
        const lang = window.I18N ? window.I18N.getLang() : 'en';
        const script = document.createElement('script');
        script.id = 'google-jssdk';
        script.src = 'https://accounts.google.com/gsi/client?hl=' + lang + '&onload=onGoogleLibraryLoad';
        script.async = true;
        script.defer = true;
        document.body.appendChild(script);

        // Redirection check if already logged in
        if (Auth.isLoggedIn()) {
          var user = Auth.getUser();
          if (user && user.role === 'ADMIN') {
            window.location.href = 'admin-dashboard/index.html';
          } else if (user && user.role === 'STAFF') {
            window.location.href = 'staff/index.html';
          } else {
            window.location.href = 'index.html';
          }
        }

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password-input');
        const togglePassword = document.getElementById('toggle-password');
        
        togglePassword.addEventListener('click', function () {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          
          if (type === 'password') {
            togglePassword.classList.remove('bi-eye-slash');
            togglePassword.classList.add('bi-eye');
          } else {
            togglePassword.classList.remove('bi-eye');
            togglePassword.classList.add('bi-eye-slash');
          }
        });

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var btn = this.querySelector('button[type=submit]');
          var msg = document.getElementById('auth-msg');
          btn.disabled = true;
          btn.textContent = t('auth.loggingIn');

          api.post('/auth/login', {
            email: this.querySelector('[name=email]').value,
            password: this.querySelector('[name=password]').value
          }).then(function (res) {
            if (res.success) {
              Auth.save(res.accessToken, res.user);
              Auth.saveTokens(res.accessToken, res.refreshToken);
              
              // Role-based redirection
              if (res.user.role === 'ADMIN') {
                window.location.href = 'admin-dashboard/index.html';
              } else if (res.user.role === 'STAFF') {
                window.location.href = 'staff/index.html';
              } else {
                window.location.href = 'index.html';
              }
            } else {
              msg.className = 'alert alert-danger';
              msg.textContent = res.message;
              msg.style.display = 'block';
              btn.disabled = false;
              btn.textContent = t('nav.login');
            }
          }).catch(function () {
            msg.className = 'alert alert-danger';
            msg.textContent = t('common.connFail');
            msg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = t('nav.login');
          });
        });
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="assets/js/CustomAlert.js"></script>
</body>
</html>
